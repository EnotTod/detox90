<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="90 дней">
<meta name="theme-color" content="#0f0f0f">
<title>90 дней свободы</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237F77DD'/><text y='.9em' font-size='60' x='50%' text-anchor='middle'>🛡️</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #252525;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #7F77DD;
    --accent2: #534AB7;
    --green: #1D9E75;
    --green-bg: rgba(29,158,117,0.12);
    --red: #D85A30;
    --red-bg: rgba(216,90,48,0.12);
    --amber: #BA7517;
    --amber-bg: rgba(186,117,23,0.12);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    padding-top: calc(env(safe-area-inset-top) + 16px);
  }
  .app-title { font-size: 13px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .attempts-badge {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .attempts-badge span { color: var(--text); font-weight: 500; }

  /* MAIN COUNTER */
  .counter-section {
    text-align: center;
    padding: 20px 20px 8px;
  }
  .day-number {
    font-size: 88px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -4px;
  }
  .day-suffix { font-size: 28px; font-weight: 400; color: var(--muted); letter-spacing: 0; }
  .day-sublabel { font-size: 14px; color: var(--muted); margin-top: 6px; }

  /* PROGRESS BAR */
  .progress-wrap { padding: 16px 20px 0; }
  .progress-track {
    background: var(--bg3);
    border-radius: 99px;
    height: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }
  .progress-labels span { font-size: 11px; color: var(--muted); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 16px 20px;
  }
  .stat-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-lab { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

  /* CURRENT STATUS */
  .status-block {
    margin: 0 20px 12px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    overflow: hidden;
  }
  .status-block.green { border-color: var(--green); background: var(--green-bg); }
  .status-block.red { border-color: var(--red); background: var(--red-bg); }
  .status-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .status-label.green { color: var(--green); }
  .status-label.red { color: var(--red); }
  .status-heading { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .status-body { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* BODY CHANGES GRID */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0 20px;
    margin-bottom: 10px;
  }
  .changes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 20px;
    margin-bottom: 12px;
  }
  .change-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 12px;
  }
  .change-icon { font-size: 20px; margin-bottom: 6px; }
  .change-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .change-val { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .change-card.highlight { border-color: var(--accent); background: rgba(127,119,221,0.1); }
  .change-card.highlight .change-title { color: var(--accent); }

  /* ACHIEVEMENTS */
  .achievements-list { padding: 0 20px; }
  .ach-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .ach-item:last-child { border-bottom: none; }
  .ach-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .ach-icon.done { background: rgba(127,119,221,0.2); }
  .ach-icon.locked { background: var(--bg3); opacity: 0.3; }
  .ach-text { flex: 1; }
  .ach-name { font-size: 14px; font-weight: 500; }
  .ach-name.done { color: var(--text); }
  .ach-name.locked { color: var(--muted); }
  .ach-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .ach-day { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .ach-day.done { color: var(--accent); }

  /* BUTTONS */
  .buttons-section { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    padding: 18px 10px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }
  .btn-ok { background: var(--accent); color: white; }
  .btn-fail { background: var(--bg3); color: var(--red); border: 0.5px solid rgba(216,90,48,0.3); }

  /* FAIL MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--bg2);
    border-radius: 24px 24px 0 0;
    padding: 8px 20px 40px;
    width: 100%; max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .modal-overlay.show .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--bg3); border-radius: 99px; margin: 12px auto 20px; }
  .modal-icon { text-align: center; font-size: 40px; margin-bottom: 12px; }
  .modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .modal-days { font-size: 15px; color: var(--muted); text-align: center; line-height: 1.6; margin-bottom: 16px; }
  .modal-restart-text {
    background: var(--red-bg);
    border: 0.5px solid rgba(216,90,48,0.3);
    border-radius: 14px;
    padding: 14px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .modal-restart-text strong { color: var(--red); }
  .modal-btns { display: grid; gap: 8px; }
  .btn-confirm-fail { background: var(--red); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-back { background: var(--bg3); color: var(--muted); border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 500; cursor: pointer; }

  .divider { height: 1px; background: var(--border); margin: 16px 20px; }
  .section-wrap { margin-bottom: 8px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="app-title">90 дней свободы</div>
  <div class="attempts-badge">попытка <span id="attemptsNum">1</span></div>
</div>

</div>

<div class="progress-wrap">

    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-labels">
    <span>день 1</span>
    <span id="progressLabel">0 / 90</span>
    <span>день 90</span>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-val" id="bestStat">0</div>
    <div class="stat-lab">рекорд</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="achStat">0</div>
    <div class="stat-lab">ачивок</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="attemptsStat">0</div>
    <div class="stat-lab">попыток</div>
  </div>
</div>

<div id="statusBlock" class="status-block" style="display:none">
  <div class="status-label" id="statusLabel"></div>
  <div class="status-heading" id="statusHeading"></div>
  <div class="status-body" id="statusBody"></div>
</div>

<div id="changesSection" class="section-wrap" style="display:none">
  <div class="section-title">что изменилось в теле</div>
  <div class="changes-grid" id="changesGrid"></div>
</div>

<div id="restartSection" class="section-wrap" style="display:none">
  <div class="section-title">что сбрасывается при срыве</div>
  <div class="changes-grid" id="restartGrid"></div>
</div>

<div class="divider"></div>
<div class="section-wrap">
  <div class="section-title">достижения</div>
  <div class="achievements-list" id="achList"></div>
</div>

<div class="buttons-section">
  <button class="btn btn-ok" onclick="handleOk()">💪 Держусь</button>
  <button class="btn btn-fail" onclick="showFailModal()">❌ Сорвался</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-icon">💔</div>
    <div class="modal-title" id="modalTitle">Ты уверен?</div>
    <div class="modal-days" id="modalDays"></div>
    <div class="modal-restart-text" id="modalRestartText"></div>
    <div class="modal-btns">
      <button class="btn-confirm-fail" onclick="handleFail()">Да, сорвался — начать заново</button>
      <button class="btn-back" onclick="closeModal(null)">Нет, держусь дальше</button>
    </div>
  </div>
</div>

// ─── STATE ──────────────────────────────────────────────────────────────────

function getState() {
  return JSON.parse(localStorage.getItem('detox90_v3') || '{"start":null,"attempts":0,"best":0}');
}
function saveState(s) { localStorage.setItem('detox90_v3', JSON.stringify(s)); }
function getDays(start) {
  if (!start) return 0;
  return Math.floor((Date.now() - start) / 86400000) + 1;
}

function getDayData(days) {
  const keys = Object.keys(DAYS).map(Number).sort((a,b) => b - a);
  for (const k of keys) {
    if (days >= k) return { ...DAYS[k], key: k };
  }
  return { ...DAYS[0], key: 0 };
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function renderChanges(items, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(c => `
    <div class="change-card ${c.hl ? 'highlight' : ''}">
      <div class="change-icon">${c.icon}</div>
      <div class="change-title">${c.title}</div>
      <div class="change-val">${c.val}</div>
    </div>`).join('');
}

function render() {
  const s = getState();
  const days = getDays(s.start);
  const data = getDayData(days);
  const pct = Math.min(100, (days / 90) * 100);
  const unlocked = ACHIEVEMENTS.filter(a => days >= a.day).length;

  document.getElementById('dayNum').innerHTML = days + '<span class="day-suffix">д</span>';
  document.getElementById('daySubLabel').textContent = days === 0
    ? 'нажми «Держусь» чтобы начать'
    : days === 1 ? '1 день без зависимости' : `${days} дней без зависимости`;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${days} / 90`;
  document.getElementById('bestStat').textContent = s.best || 0;
  document.getElementById('achStat').textContent = unlocked;
  document.getElementById('attemptsStat').textContent = s.attempts || 0;
  document.getElementById('attemptsNum').textContent = s.attempts || 0;

  const sb = document.getElementById('statusBlock');
  if (data) {
    sb.style.display = '';
    sb.className = 'status-block ' + (days > 0 ? 'green' : '');
    document.getElementById('statusLabel').className = 'status-label ' + (days > 0 ? 'green' : '');
    document.getElementById('statusLabel').textContent = data.title;
    document.getElementById('statusHeading').textContent = data.headline;
    document.getElementById('statusBody').textContent = data.body;
  }

  const changesSection = document.getElementById('changesSection');
  const restartSection = document.getElementById('restartSection');

  if (days > 0 && data.changes && data.changes.length) {
    changesSection.style.display = '';
    renderChanges(data.changes, 'changesGrid');
  } else {
    changesSection.style.display = 'none';
  }

  if (days > 0 && data.resets && data.resets.length) {
    restartSection.style.display = '';
    renderChanges(data.resets.map(r => ({ ...r, hl: false })), 'restartGrid');
  } else {
    restartSection.style.display = 'none';
  }

  document.getElementById('achList').innerHTML = ACHIEVEMENTS.map(a => {
    const done = days >= a.day;
    return `<div class="ach-item">
      <div class="ach-icon ${done ? 'done' : 'locked'}">${a.emoji}</div>
      <div class="ach-text">
        <div class="ach-name ${done ? 'done' : 'locked'}">${a.name}</div>
        <div class="ach-desc">${a.desc}</div>
      </div>
      <div class="ach-day ${done ? 'done' : ''}">д. ${a.day}</div>
    </div>`;
  }).join('');
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────

function handleOk() {
  const s = getState();
  if (!s.start) {
    s.start = Date.now();
    s.attempts = (s.attempts || 0) + 1;
    saveState(s);
  }
  render();
  if (window.navigator.vibrate) window.navigator.vibrate(50);
}

function showFailModal() {
  const s = getState();
  const days = getDays(s.start);

  if (days === 0) {
    document.getElementById('modalTitle').textContent = 'Ты ещё не начал';
    document.getElementById('modalDays').textContent = 'Нажми «Держусь» — это твой первый шаг.';
    document.getElementById('modalRestartText').innerHTML = 'Кнопка «Сорвался» есть только для тех кто уже держится.';
  } else {
    const data = getDayData(days);
    const resetItems = data.resets || [];
    document.getElementById('modalTitle').textContent = `${days} дней будет потеряно`;
    document.getElementById('modalDays').textContent = `Ты продержался ${days} ${days===1?'день':days<5?'дня':'дней'}. Вот что сбросится:`;
    document.getElementById('modalRestartText').innerHTML =
      resetItems.map(r => `<strong>${r.icon} ${r.title}:</strong> ${r.val}`).join('<br>') ||
      '<strong>Весь прогресс</strong> сбрасывается к нулю.';
  }

  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (e === null || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
  }
}

function handleFail() {
  const s = getState();
  const days = getDays(s.start);
  if (days > 0) {
    s.best = Math.max(s.best || 0, days);
    s.start = null;
    saveState(s);
  }
  document.getElementById('modal').classList.remove('show');
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
